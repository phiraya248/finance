<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>การเงินส่วนตัว</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FFF8FA;--surface:#FFFFFF;--border:#F0E4EA;--border2:#E0CEDB;
  --text:#2A1520;--text2:#8A6878;--text3:#BBA0B0;
  --pink:#C0517A;--pink-bg:#FCF0F4;--pink-dark:#9A3A5C;
  --inc:#1B7A4E;--inc-bg:#EAF5EF;
  --exp:#C0392B;--exp-bg:#FDECEA;
  --warn:#B8660A;--warn-bg:#FEF3E2;
  --info:#1558A0;--info-bg:#EBF2FC;
  --radius:14px;--radius-sm:10px;
  --font:'Sarabun',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1A0F14;--surface:#241419;--border:#3A2030;--border2:#4A3040;
    --text:#F5E8EE;--text2:#B08898;--text3:#705868;
    --pink:#E07098;--pink-bg:#2A1020;--pink-dark:#F090B8;
    --inc:#4CAF82;--inc-bg:#0D2B1C;
    --exp:#E57373;--exp-bg:#2B0D0D;
    --warn:#F0A030;--warn-bg:#2B1A05;
    --info:#5B9FE0;--info-bg:#0D1E30;
  }
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:16px;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100dvh}
.hdr{padding:env(safe-area-inset-top,16px) 16px 0;background:var(--surface);border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
.hdr-title{font-size:18px;font-weight:600;letter-spacing:-0.3px;color:var(--pink-dark)}
.month-pill{font-size:13px;color:var(--text2);background:var(--pink-bg);border:1px solid var(--border);border-radius:20px;padding:5px 14px;cursor:pointer;font-family:var(--font)}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-bottom:14px}
.sum-card{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;border:1px solid var(--border)}
.sum-lbl{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500;letter-spacing:.3px}
.sum-val{font-size:17px;font-weight:600;letter-spacing:-0.5px}
.sum-val.g{color:var(--inc)}.sum-val.r{color:var(--exp)}.sum-val.b{color:var(--pink)}.sum-val.a{color:var(--warn)}
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.ntab{flex:1;min-width:55px;padding:11px 4px;font-size:12px;font-weight:500;text-align:center;color:var(--text3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;font-family:var(--font);white-space:nowrap;transition:color .15s}
.ntab.on{color:var(--pink);border-bottom-color:var(--pink)}
.content{flex:1;overflow-y:auto;background:var(--bg);padding-bottom:env(safe-area-inset-bottom,16px)}
.page{display:none}.page.on{display:block}
.lhdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
.lhdr-title{font-size:13px;color:var(--text3);font-weight:500}
.add-btn{width:34px;height:34px;border-radius:50%;background:var(--pink);color:#fff;border:none;cursor:pointer;font-size:20px;font-weight:300;display:flex;align-items:center;justify-content:center;line-height:1;transition:transform .1s}
.add-btn:active{transform:scale(.92)}
.pills{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text2);font-family:var(--font);white-space:nowrap;transition:all .15s}
.pill.on{background:var(--pink);color:#fff;border-color:var(--pink)}
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.tx-ico{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-ico.i{background:var(--inc-bg)}.tx-ico.e{background:var(--exp-bg)}
.tx-body{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:var(--text3);margin-top:2px}
.tx-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tx-amt{font-size:14px;font-weight:600;letter-spacing:-0.3px}
.tx-amt.i{color:var(--inc)}.tx-amt.e{color:var(--exp)}
.del-btn{width:26px;height:26px;border-radius:50%;border:none;background:var(--exp-bg);color:var(--exp);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.6;transition:opacity .15s}
.del-btn:active{opacity:1}
.bill-item{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.b-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.b-dot.pending{background:var(--warn)}.b-dot.paid{background:var(--inc)}.b-dot.overdue{background:var(--exp)}
.b-body{flex:1;min-width:0}
.b-name{font-size:14px;font-weight:500}
.b-due{font-size:12px;color:var(--text3);margin-top:2px}
.b-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.b-amt{font-size:14px;font-weight:600;letter-spacing:-0.3px}
.status-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;cursor:pointer;border:none;font-family:var(--font)}
.st-pending{background:var(--warn-bg);color:var(--warn)}.st-paid{background:var(--inc-bg);color:var(--inc)}.st-overdue{background:var(--exp-bg);color:var(--exp)}
.liab-item{padding:13px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.liab-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.liab-name{font-size:14px;font-weight:500}
.liab-cred{font-size:12px;color:var(--text3);margin-top:2px}
.liab-r{text-align:right}
.liab-rem{font-size:14px;font-weight:600;color:var(--exp);letter-spacing:-0.3px}
.liab-mo{font-size:12px;color:var(--text3);margin-top:2px}
.prog{height:4px;background:var(--border);border-radius:4px;overflow:hidden;flex:1}
.prog-fill{height:100%;border-radius:4px;background:var(--pink)}
.prog-row{display:flex;align-items:center;gap:8px}
.prog-pct{font-size:11px;color:var(--text3);min-width:28px;text-align:right}
.recv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.recv-av{width:38px;height:38px;border-radius:50%;background:var(--pink-bg);color:var(--pink);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recv-body{flex:1;min-width:0}
.recv-name{font-size:14px;font-weight:500}
.recv-note{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recv-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.recv-amt{font-size:14px;font-weight:600;color:var(--inc);letter-spacing:-0.3px}
.chart-section{padding:16px;display:flex;flex-direction:column;gap:14px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.chart-lbl{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;letter-spacing:.2px}
.chart-legend{display:flex;gap:12px;margin-top:10px;justify-content:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.goal-section{padding:16px;display:flex;flex-direction:column;gap:12px}
.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.goal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.goal-name{font-size:14px;font-weight:600}
.goal-target{font-size:12px;color:var(--text3);margin-top:2px}
.goal-saved{font-size:18px;font-weight:600;color:var(--pink)}
.goal-pct-txt{font-size:12px;color:var(--text3);margin-top:2px}
.goal-prog{height:8px;background:var(--border);border-radius:8px;overflow:hidden;margin:8px 0}
.goal-prog-fill{height:100%;border-radius:8px;background:var(--pink);transition:width .4s}
.goal-actions{display:flex;gap:8px;margin-top:10px}
.goal-add-btn{flex:1;padding:9px;font-size:13px;font-weight:500;border:1px solid var(--pink);background:var(--pink-bg);color:var(--pink);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font)}
.goal-del-btn{padding:9px 12px;font-size:13px;border:1px solid var(--border2);background:transparent;color:var(--text3);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font)}
.empty{padding:48px 24px;text-align:center;color:var(--text3);font-size:14px;line-height:1.8}
.empty-icon{font-size:36px;margin-bottom:10px;display:block}
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;backdrop-filter:blur(2px)}
.sheet-bg.on{display:flex;align-items:flex-end}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:92dvh;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom,20px)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:4px;margin:12px auto 0}
.sheet-title{font-size:16px;font-weight:600;text-align:center;padding:14px 16px 0;color:var(--pink-dark)}
.sheet-body{padding:16px}
.frow{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.frow label{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.2px}
.frow input,.frow select{font-size:16px;padding:12px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);width:100%;outline:none;transition:border-color .15s}
.frow input:focus,.frow select:focus{border-color:var(--pink)}
.seg{display:flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:12px}
.seg-btn{flex:1;padding:11px;font-size:14px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--text2);font-family:var(--font);transition:all .15s}
.seg-btn.on{background:var(--pink);color:#fff}
.btns{display:grid;grid-template-columns:1fr 2fr;gap:10px;margin-top:4px}
.btn-c{padding:13px;border:1px solid var(--border2);background:transparent;border-radius:var(--radius-sm);cursor:pointer;font-size:15px;font-weight:500;color:var(--text2);font-family:var(--font)}
.btn-s{padding:13px;border:none;background:var(--pink);color:#fff;border-radius:var(--radius-sm);cursor:pointer;font-size:15px;font-weight:600;font-family:var(--font)}
.btn-s:active{opacity:.85}
.confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:24px}
.confirm-bg.on{display:flex}
.confirm-box{background:var(--surface);border-radius:var(--radius);padding:22px 20px;width:100%;max-width:300px;text-align:center}
.confirm-title{font-size:15px;font-weight:600;margin-bottom:6px}
.confirm-msg{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cbtn-n{padding:11px;border:1px solid var(--border2);background:transparent;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);font-family:var(--font)}
.cbtn-y{padding:11px;border:none;background:var(--exp);color:#fff;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--pink-dark);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">💗 การเงินส่วนตัว</div>
    <button class="month-pill" id="monthPill"></button>
  </div>
  <div class="summary">
    <div class="sum-card"><div class="sum-lbl">รายรับ</div><div class="sum-val g" id="s-inc">฿0</div></div>
    <div class="sum-card"><div class="sum-lbl">รายจ่าย</div><div class="sum-val r" id="s-exp">฿0</div></div>
    <div class="sum-card"><div class="sum-lbl">คงเหลือ</div><div class="sum-val b" id="s-bal">฿0</div></div>
    <div class="sum-card"><div class="sum-lbl">รอจ่าย</div><div class="sum-val a" id="s-pend">฿0</div></div>
  </div>
</div>
<div class="nav">
  <button class="ntab on" onclick="showPage('tx',this)">รายรับ-จ่าย</button>
  <button class="ntab" onclick="showPage('bills',this)">ต้องจ่าย</button>
  <button class="ntab" onclick="showPage('liab',this)">หนี้สิน</button>
  <button class="ntab" onclick="showPage('recv',this)">ลูกหนี้</button>
  <button class="ntab" onclick="showPage('chart',this)">กราฟ</button>
  <button class="ntab" onclick="showPage('goals',this)">เป้าหมาย</button>
</div>
<div class="content">
  <div class="page on" id="tx-page">
    <div class="lhdr"><div class="lhdr-title" id="tx-count">0 รายการ</div><button class="add-btn" onclick="openSheet('tx')">+</button></div>
    <div class="pills">
      <button class="pill on" onclick="setFilter('tx','all',this)">ทั้งหมด</button>
      <button class="pill" onclick="setFilter('tx','income',this)">รายรับ</button>
      <button class="pill" onclick="setFilter('tx','expense',this)">รายจ่าย</button>
    </div>
    <div id="tx-list"></div>
  </div>
  <div class="page" id="bills-page">
    <div class="lhdr"><div class="lhdr-title" id="bill-count">0 รายการ</div><button class="add-btn" onclick="openSheet('bill')">+</button></div>
    <div class="pills">
      <button class="pill on" onclick="setFilter('bill','all',this)">ทั้งหมด</button>
      <button class="pill" onclick="setFilter('bill','pending',this)">รอจ่าย</button>
      <button class="pill" onclick="setFilter('bill','overdue',this)">เลยกำหนด</button>
      <button class="pill" onclick="setFilter('bill','paid',this)">จ่ายแล้ว</button>
    </div>
    <div id="bill-list"></div>
  </div>
  <div class="page" id="liab-page">
    <div class="lhdr"><div class="lhdr-title" id="liab-count">0 รายการ</div><button class="add-btn" onclick="openSheet('liab')">+</button></div>
    <div id="liab-list"></div>
  </div>
  <div class="page" id="recv-page">
    <div class="lhdr"><div class="lhdr-title" id="recv-count">0 รายการ</div><button class="add-btn" onclick="openSheet('recv')">+</button></div>
    <div class="pills">
      <button class="pill on" onclick="setFilter('recv','all',this)">ทั้งหมด</button>
      <button class="pill" onclick="setFilter('recv','pending',this)">รอชำระ</button>
      <button class="pill" onclick="setFilter('recv','paid',this)">รับแล้ว</button>
    </div>
    <div id="recv-list"></div>
  </div>
  <div class="page" id="chart-page">
    <div class="chart-section">
      <div class="chart-box">
        <div class="chart-lbl">รายรับ vs รายจ่าย 6 เดือนล่าสุด</div>
        <canvas id="barChart" height="200"></canvas>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--inc)"></div>รายรับ</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div>รายจ่าย</div>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-lbl">สัดส่วนรายจ่ายตามหมวด</div>
        <canvas id="pieChart" height="200"></canvas>
        <div class="chart-legend" id="pie-legend"></div>
      </div>
    </div>
  </div>
  <div class="page" id="goals-page">
    <div class="lhdr"><div class="lhdr-title" id="goal-count">0 เป้าหมาย</div><button class="add-btn" onclick="openSheet('goal')">+</button></div>
    <div class="goal-section" id="goal-list"></div>
  </div>
</div>

<div class="sheet-bg" id="sheet-bg" onclick="handleBgClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title"></div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>
</div>
<div class="confirm-bg" id="confirm-bg">
  <div class="confirm-box">
    <div class="confirm-title">ยืนยันการลบ</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="cbtn-n" onclick="closeConfirm()">ยกเลิก</button>
      <button class="cbtn-y" id="confirm-ok">ลบ</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const KEY='pf_v3';
const fmt=n=>'฿'+Math.round(n).toLocaleString('th-TH');
const ini=s=>s.trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
const today=()=>new Date().toISOString().slice(0,10);
const CAT_EXP=['อาหาร','เครื่องดื่ม','ช็อปปิง','ความงาม','สุขภาพ','เดินทาง','ที่อยู่','สาธารณูปโภค','บันเทิง','การศึกษา','เสื้อผ้า','ของขวัญ','อื่นๆ'];
const CAT_INC=['เงินเดือน','ฟรีแลนซ์','ลงทุน','ขายของ','โบนัส','อื่นๆ'];
const PIE_COLORS=['#C0517A','#1B7A4E','#1558A0','#B8660A','#7B3FA0','#2E86AB','#E8A838','#6BAA75','#D4547E','#5B8DB8','#A06840','#4E9A8A'];
let db={tx:[],bills:[],liab:[],recv:[],goals:[]};
let filters={tx:'all',bill:'all',recv:'all'};
let txType='expense';
let barChart=null,pieChart=null;

function load(){
  try{const d=localStorage.getItem(KEY);if(d)db=JSON.parse(d);else seedDemo();}
  catch(e){seedDemo();}
  renderAll();
}
function seedDemo(){
  const t=today();
  db={
    tx:[
      {id:1,date:t,name:'เงินเดือน',cat:'เงินเดือน',type:'income',amount:45000},
      {id:2,date:t,name:'ค่าเช่าบ้าน',cat:'ที่อยู่',type:'expense',amount:12000},
      {id:3,date:t,name:'ค่าอาหาร',cat:'อาหาร',type:'expense',amount:3500},
      {id:4,date:t,name:'ค่ากาแฟ',cat:'เครื่องดื่ม',type:'expense',amount:850},
      {id:5,date:t,name:'ค่าสกินแคร์',cat:'ความงาม',type:'expense',amount:2200},
    ],
    bills:[
      {id:1,name:'ค่าโทรศัพท์',due:'2026-04-28',amount:890,status:'pending'},
      {id:2,name:'ค่าบัตรเครดิต',due:'2026-05-05',amount:8500,status:'pending'},
      {id:3,name:'Netflix',due:'2026-04-15',amount:449,status:'paid'},
    ],
    liab:[
      {id:1,name:'สินเชื่อรถยนต์',creditor:'ธนาคารกสิกร',monthly:8900,remaining:280000,total:400000},
      {id:2,name:'บัตรเครดิต',creditor:'KTC',monthly:3000,remaining:45000,total:60000},
    ],
    recv:[
      {id:1,debtor:'คุณแนน',note:'ยืมค่าอาหาร',due:'2026-04-30',amount:500,paid:0,status:'pending'},
      {id:2,debtor:'คุณมิ้น',note:'ค่าของขวัญร่วม',due:'2026-05-10',amount:1200,paid:0,status:'pending'},
    ],
    goals:[
      {id:1,name:'ท่องเที่ยวยุโรป',target:150000,saved:42000},
      {id:2,name:'กองทุนฉุกเฉิน',target:100000,saved:65000},
    ]
  };
  save();
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function showConfirm(msg,cb){
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-ok').onclick=()=>{closeConfirm();cb();};
  document.getElementById('confirm-bg').classList.add('on');
}
function closeConfirm(){document.getElementById('confirm-bg').classList.remove('on');}
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  document.getElementById(id+'-page').classList.add('on');
  btn.classList.add('on');
  if(id==='chart')setTimeout(renderCharts,80);
}
function setFilter(type,val,btn){
  filters[type]=val;
  const scope=type==='tx'?'tx-page':type==='bill'?'bills-page':type+'-page';
  document.querySelectorAll('#'+scope+' .pill').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  if(type==='tx')renderTx();else if(type==='bill')renderBills();else renderRecv();
}
function renderAll(){renderSummary();renderTx();renderBills();renderLiab();renderRecv();renderGoals();}
function renderSummary(){
  let inc=0,exp=0,pend=0;
  db.tx.forEach(t=>{if(t.type==='income')inc+=t.amount;else exp+=t.amount;});
  db.bills.filter(b=>b.status!=='paid').forEach(b=>pend+=b.amount);
  document.getElementById('s-inc').textContent=fmt(inc);
  document.getElementById('s-exp').textContent=fmt(exp);
  document.getElementById('s-bal').textContent=fmt(inc-exp);
  document.getElementById('s-pend').textContent=fmt(pend);
}
function renderTx(){
  const rows=db.tx.filter(t=>filters.tx==='all'||t.type===filters.tx).sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  document.getElementById('tx-count').textContent=rows.length+' รายการ';
  document.getElementById('tx-list').innerHTML=rows.length?rows.map(t=>`
    <div class="tx-item">
      <div class="tx-ico ${t.type==='income'?'i':'e'}">${t.type==='income'?'↑':'↓'}</div>
      <div class="tx-body"><div class="tx-name">${t.name}</div><div class="tx-meta">${t.cat} · ${t.date.slice(5).replace('-','/')}</div></div>
      <div class="tx-right">
        <div class="tx-amt ${t.type==='income'?'i':'e'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
        <button class="del-btn" onclick="delTx(${t.id})">✕</button>
      </div>
    </div>`).join(''):`<div class="empty"><span class="empty-icon">💸</span>ยังไม่มีรายการ<br>กด + เพื่อเพิ่ม</div>`;
}
function renderBills(){
  const rows=db.bills.filter(b=>filters.bill==='all'||b.status===filters.bill).sort((a,b)=>a.due.localeCompare(b.due));
  document.getElementById('bill-count').textContent=rows.length+' รายการ';
  const lbl={pending:'รอจ่าย',paid:'จ่ายแล้ว',overdue:'เลยกำหนด'};
  document.getElementById('bill-list').innerHTML=rows.length?rows.map(b=>`
    <div class="bill-item">
      <div class="b-dot ${b.status}"></div>
      <div class="b-body"><div class="b-name">${b.name}</div><div class="b-due">ครบ ${b.due.slice(5).replace('-','/')}</div></div>
      <div class="b-right"><div class="b-amt">${fmt(b.amount)}</div><button class="status-tag st-${b.status}" onclick="toggleBill(${b.id})">${lbl[b.status]}</button></div>
    </div>`).join(''):`<div class="empty"><span class="empty-icon">📋</span>ไม่มีรายการ</div>`;
}
function renderLiab(){
  document.getElementById('liab-count').textContent=db.liab.length+' รายการ';
  document.getElementById('liab-list').innerHTML=db.liab.length?db.liab.map(l=>{
    const pct=Math.min(100,Math.round((1-l.remaining/l.total)*100));
    return `<div class="liab-item">
      <div class="liab-top">
        <div><div class="liab-name">${l.name}</div><div class="liab-cred">${l.creditor}</div></div>
        <div class="liab-r"><div class="liab-rem">${fmt(l.remaining)}</div><div class="liab-mo">${fmt(l.monthly)}/เดือน</div></div>
      </div>
      <div class="prog-row"><div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-pct">${pct}%</div></div>
    </div>`;
  }).join(''):`<div class="empty"><span class="empty-icon">🏦</span>ไม่มีหนี้สิน</div>`;
}
function renderRecv(){
  const rows=db.recv.filter(r=>filters.recv==='all'||r.status===filters.recv);
  document.getElementById('recv-count').textContent=rows.length+' รายการ';
  document.getElementById('recv-list').innerHTML=rows.length?rows.map(r=>`
    <div class="recv-item">
      <div class="recv-av">${ini(r.debtor)}</div>
      <div class="recv-body"><div class="recv-name">${r.debtor}</div><div class="recv-note">${r.note} · ครบ ${r.due.slice(5).replace('-','/')}</div></div>
      <div class="recv-r">
        <div class="recv-amt">${fmt(r.amount-r.paid)}</div>
        ${r.status!=='paid'?`<button class="status-tag st-pending" onclick="markRecvPaid(${r.id})">รอชำระ</button>`:`<span class="status-tag st-paid">รับแล้ว</span>`}
      </div>
    </div>`).join(''):`<div class="empty"><span class="empty-icon">🤝</span>ไม่มีลูกหนี้</div>`;
}
function renderGoals(){
  document.getElementById('goal-count').textContent=db.goals.length+' เป้าหมาย';
  const el=document.getElementById('goal-list');
  if(!db.goals.length){el.innerHTML=`<div class="empty"><span class="empty-icon">🎯</span>ยังไม่มีเป้าหมาย<br>กด + เพื่อเพิ่ม</div>`;return;}
  el.innerHTML=db.goals.map(g=>{
    const pct=Math.min(100,Math.round(g.saved/g.target*100));
    return `<div class="goal-card">
      <div class="goal-head">
        <div><div class="goal-name">${g.name}</div><div class="goal-target">เป้า ${fmt(g.target)}</div></div>
        <div style="text-align:right"><div class="goal-saved">${fmt(g.saved)}</div><div class="goal-pct-txt">${pct}% · เหลืออีก ${fmt(Math.max(0,g.target-g.saved))}</div></div>
      </div>
      <div class="goal-prog"><div class="goal-prog-fill" style="width:${pct}%"></div></div>
      <div class="goal-actions">
        <button class="goal-add-btn" onclick="openAddSavings(${g.id})">+ เพิ่มเงินออม</button>
        <button class="goal-del-btn" onclick="delGoal(${g.id})">ลบ</button>
      </div>
    </div>`;
  }).join('');
}
function renderCharts(){
  const thM=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const now=new Date();
  const labels=[],incD=[],expD=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const ym=d.toISOString().slice(0,7);
    labels.push(thM[d.getMonth()]);
    let inc=0,exp=0;
    db.tx.forEach(t=>{if(t.date.slice(0,7)===ym){if(t.type==='income')inc+=t.amount;else exp+=t.amount;}});
    incD.push(inc);expD.push(exp);
  }
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
  const tc=isDark?'#B08898':'#BBA0B0';
  const bCtx=document.getElementById('barChart').getContext('2d');
  if(barChart)barChart.destroy();
  barChart=new Chart(bCtx,{type:'bar',data:{labels,datasets:[
    {label:'รายรับ',data:incD,backgroundColor:'rgba(27,122,78,0.75)',borderRadius:5},
    {label:'รายจ่าย',data:expD,backgroundColor:'rgba(192,81,122,0.75)',borderRadius:5}
  ]},options:{responsive:true,plugins:{legend:{display:false}},scales:{
    x:{grid:{color:gc},ticks:{color:tc,font:{family:'Sarabun',size:11}}},
    y:{grid:{color:gc},ticks:{color:tc,font:{family:'Sarabun',size:11},callback:v=>v>=1000?(v/1000)+'K':v}}
  }}});
  const catMap={};
  db.tx.filter(t=>t.type==='expense').forEach(t=>{catMap[t.cat]=(catMap[t.cat]||0)+t.amount;});
  const cats=Object.keys(catMap),vals=cats.map(c=>catMap[c]);
  const pCtx=document.getElementById('pieChart').getContext('2d');
  if(pieChart)pieChart.destroy();
  if(!cats.length){pCtx.canvas.parentElement.innerHTML='<div class="empty" style="padding:16px">ยังไม่มีข้อมูลรายจ่าย</div>';return;}
  pieChart=new Chart(pCtx,{type:'doughnut',data:{labels:cats,datasets:[{data:vals,backgroundColor:PIE_COLORS.slice(0,cats.length),borderWidth:0}]},options:{responsive:true,plugins:{legend:{display:false}},cutout:'60%'}});
  const total=vals.reduce((a,b)=>a+b,0);
  document.getElementById('pie-legend').innerHTML=cats.map((c,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${PIE_COLORS[i]}"></div>${c} ${Math.round(vals[i]/total*100)}%</div>`).join('');
}
function delTx(id){
  const t=db.tx.find(x=>x.id===id);if(!t)return;
  showConfirm(`ลบ "${t.name}" ${fmt(t.amount)}?`,()=>{db.tx=db.tx.filter(x=>x.id!==id);save();renderAll();showToast('ลบแล้ว');});
}
function delGoal(id){
  const g=db.goals.find(x=>x.id===id);if(!g)return;
  showConfirm(`ลบเป้าหมาย "${g.name}"?`,()=>{db.goals=db.goals.filter(x=>x.id!==id);save();renderGoals();showToast('ลบแล้ว');});
}
function toggleBill(id){const b=db.bills.find(x=>x.id===id);if(!b)return;b.status=b.status==='paid'?'pending':'paid';save();renderAll();showToast(b.status==='paid'?'จ่ายแล้ว ✓':'ยกเลิกการจ่าย');}
function markRecvPaid(id){const r=db.recv.find(x=>x.id===id);if(!r)return;r.paid=r.amount;r.status='paid';save();renderAll();showToast('รับเงินแล้ว ✓');}
function openAddSavings(id){
  const g=db.goals.find(x=>x.id===id);if(!g)return;
  document.getElementById('sheet-title').textContent='เพิ่มเงินออม';
  document.getElementById('sheet-body').innerHTML=`
    <div style="text-align:center;margin-bottom:12px;font-size:13px;color:var(--text2)">${g.name} · ออมแล้ว ${fmt(g.saved)} / ${fmt(g.target)}</div>
    <div class="frow"><label>จำนวนที่ออมเพิ่ม (บาท)</label><input id="f-amount" type="number" inputmode="decimal" placeholder="0"></div>
    <div class="btns"><button class="btn-c" onclick="closeSheet()">ยกเลิก</button><button class="btn-s" onclick="addSavings(${id})">บันทึก</button></div>`;
  document.getElementById('sheet-bg').classList.add('on');
}
function addSavings(id){
  const g=db.goals.find(x=>x.id===id);if(!g)return;
  const amt=parseFloat(document.getElementById('f-amount').value)||0;
  if(!amt){showToast('กรุณากรอกจำนวน');return;}
  g.saved=Math.min(g.target,g.saved+amt);
  save();closeSheet();renderGoals();showToast('เพิ่มเงินออมแล้ว ✓');
}
const sheetForms={
  tx(){
    document.getElementById('sheet-title').textContent='เพิ่มรายรับ / รายจ่าย';
    txType='expense';
    document.getElementById('sheet-body').innerHTML=`
      <div class="seg"><button class="seg-btn" id="seg-i" onclick="setTxType('income')">รายรับ</button><button class="seg-btn on" id="seg-e" onclick="setTxType('expense')">รายจ่าย</button></div>
      <div class="frow"><label>รายการ</label><input id="f-name" type="text" placeholder="เช่น ค่าอาหาร กาแฟ เงินเดือน"></div>
      <div class="frow"><label>จำนวน (บาท)</label><input id="f-amount" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="frow"><label>หมวดหมู่</label><select id="f-cat"><optgroup label="รายจ่าย">${CAT_EXP.map(c=>`<option>${c}</option>`).join('')}</optgroup><optgroup label="รายรับ">${CAT_INC.map(c=>`<option>${c}</option>`).join('')}</optgroup></select></div>
      <div class="frow"><label>วันที่</label><input id="f-date" type="date" value="${today()}"></div>
      <div class="btns"><button class="btn-c" onclick="closeSheet()">ยกเลิก</button><button class="btn-s" onclick="saveTx()">บันทึก</button></div>`;
  },
  bill(){
    document.getElementById('sheet-title').textContent='เพิ่มรายการต้องจ่าย';
    document.getElementById('sheet-body').innerHTML=`
      <div class="frow"><label>รายการ</label><input id="f-name" type="text" placeholder="เช่น ค่าบัตรเครดิต ประกัน"></div>
      <div class="frow"><label>จำนวน (บาท)</label><input id="f-amount" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="frow"><label>ครบกำหนด</label><input id="f-due" type="date" value="${today()}"></div>
      <div class="btns"><button class="btn-c" onclick="closeSheet()">ยกเลิก</button><button class="btn-s" onclick="saveBill()">บันทึก</button></div>`;
  },
  liab(){
    document.getElementById('sheet-title').textContent='เพิ่มหนี้สิน';
    document.getElementById('sheet-body').innerHTML=`
      <div class="frow"><label>รายการ</label><input id="f-name" type="text" placeholder="เช่น สินเชื่อรถ บัตรเครดิต"></div>
      <div class="frow"><label>เจ้าหนี้</label><input id="f-creditor" type="text" placeholder="ธนาคาร / บุคคล"></div>
      <div class="frow"><label>ผ่อน / เดือน (บาท)</label><input id="f-monthly" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="frow"><label>ยอดคงเหลือ (บาท)</label><input id="f-remaining" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="frow"><label>ยอดหนี้ทั้งหมด (บาท)</label><input id="f-total" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="btns"><button class="btn-c" onclick="closeSheet()">ยกเลิก</button><button class="btn-s" onclick="saveLiab()">บันทึก</button></div>`;
  },
  recv(){
    document.getElementById('sheet-title').textContent='เพิ่มลูกหนี้';
    document.getElementById('sheet-body').innerHTML=`
      <div class="frow"><label>ชื่อ</label><input id="f-debtor" type="text" placeholder="ชื่อคนที่ยืมเงิน"></div>
      <div class="frow"><label>รายละเอียด</label><input id="f-note" type="text" placeholder="เช่น ยืมค่าอาหาร ค่าตั๋ว"></div>
      <div class="frow"><label>จำนวน (บาท)</label><input id="f-amount" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="frow"><label>ครบกำหนด</label><input id="f-due" type="date" value="${today()}"></div>
      <div class="btns"><button class="btn-c" onclick="closeSheet()">ยกเลิก</button><button class="btn-s" onclick="saveRecv()">บันทึก</button></div>`;
  },
  goal(){
    document.getElementById('sheet-title').textContent='เพิ่มเป้าหมายออมเงิน';
    document.getElementById('sheet-body').innerHTML=`
      <div class="frow"><label>ชื่อเป้าหมาย</label><input id="f-name" type="text" placeholder="เช่น ท่องเที่ยว กองทุนฉุกเฉิน"></div>
      <div class="frow"><label>ยอดเป้าหมาย (บาท)</label><input id="f-target" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="frow"><label>ออมไปแล้ว (บาท)</label><input id="f-saved" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="btns"><button class="btn-c" onclick="closeSheet()">ยกเลิก</button><button class="btn-s" onclick="saveGoal()">บันทึก</button></div>`;
  }
};
function openSheet(type){sheetForms[type]();document.getElementById('sheet-bg').classList.add('on');setTimeout(()=>{const f=document.getElementById('f-name');if(f)f.focus();},300);}
function closeSheet(){document.getElementById('sheet-bg').classList.remove('on');}
function handleBgClick(e){if(e.target===document.getElementById('sheet-bg'))closeSheet();}
function setTxType(t){txType=t;document.getElementById('seg-i').classList.toggle('on',t==='income');document.getElementById('seg-e').classList.toggle('on',t==='expense');}
function g(id){return document.getElementById(id);}
function gv(id){return g(id)?g(id).value.trim():'';}
function gn(id){return parseFloat(g(id)?g(id).value:0)||0;}
function nextId(arr){return arr.length?Math.max(...arr.map(x=>x.id))+1:1;}
function saveTx(){const name=gv('f-name'),amount=gn('f-amount');if(!name||!amount){showToast('กรุณากรอกข้อมูลให้ครบ');return;}db.tx.push({id:nextId(db.tx),date:gv('f-date')||today(),name,cat:gv('f-cat')||'อื่นๆ',type:txType,amount});save();closeSheet();renderAll();showToast('บันทึกแล้ว ✓');}
function saveBill(){const name=gv('f-name'),amount=gn('f-amount');if(!name||!amount){showToast('กรุณากรอกข้อมูลให้ครบ');return;}db.bills.push({id:nextId(db.bills),name,due:gv('f-due')||today(),amount,status:'pending'});save();closeSheet();renderAll();showToast('บันทึกแล้ว ✓');}
function saveLiab(){const name=gv('f-name'),monthly=gn('f-monthly');if(!name||!monthly){showToast('กรุณากรอกข้อมูลให้ครบ');return;}db.liab.push({id:nextId(db.liab),name,creditor:gv('f-creditor')||'-',monthly,remaining:gn('f-remaining'),total:gn('f-total')||gn('f-remaining')||1});save();closeSheet();renderAll();showToast('บันทึกแล้ว ✓');}
function saveRecv(){const debtor=gv('f-debtor'),amount=gn('f-amount');if(!debtor||!amount){showToast('กรุณากรอกข้อมูลให้ครบ');return;}db.recv.push({id:nextId(db.recv),debtor,note:gv('f-note')||'-',due:gv('f-due')||today(),amount,paid:0,status:'pending'});save();closeSheet();renderAll();showToast('บันทึกแล้ว ✓');}
function saveGoal(){const name=gv('f-name'),target=gn('f-target');if(!name||!target){showToast('กรุณากรอกข้อมูลให้ครบ');return;}db.goals.push({id:nextId(db.goals),name,target,saved:gn('f-saved')});save();closeSheet();renderGoals();showToast('บันทึกแล้ว ✓');}
const thM=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const now=new Date();
document.getElementById('monthPill').textContent=thM[now.getMonth()]+' '+(now.getFullYear()+543);
load();
</script>
</body>
</html>
